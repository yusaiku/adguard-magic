# AdGuard Home initial configuration with DoH/DoT encryption
# Generated by entrypoint. You can edit via Web UI after first start.
http:
  address: 0.0.0.0:3000
  session_ttl: 720h
dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  upstream_dns:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  bootstrap_dns:
    - 1.1.1.1
    - 8.8.8.8
  protection_enabled: true
  filtering_enabled: true
  filters_update_interval: 24
  safe_search:
    enabled: false
  use_private_ptr_resolvers: true
  private_ptr_upstream:
    - 127.0.0.1
  serve_http3: false
  use_http3_upstreams: false
tls:
  enabled: true
  server_name: ${DOMAIN}
  force_https: false
  port_https: 443
  port_dns_over_tls: 853
  port_dns_over_quic: 0
  port_dnscrypt: 0
  dnscrypt_config_file: ""
  allow_unencrypted_doh: false
  strict_sni_check: false
  certificate_chain: ""
  private_key: ""
  certificate_path: ${CERT_DIR}/fullchain.pem
  private_key_path: ${CERT_DIR}/privkey.pem
  # certificate_chain and private_key take precedence for encryption
querylog:
  enabled: true
  interval: 90d
  size_memory: 1000
  ignored: []
statistics:
  enabled: true
  interval: 90d
  ignored: []
filters:
  - enabled: true
    url: https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
    name: AdGuard DNS filter
    id: 1
  - enabled: true
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/master/Filters/filter.txt
    name: AdGuard DNS filter (mirror)
    id: 2
whitelist_filters: []
user_rules: []
dhcp:
  enabled: false
  interface_name: ""
  local_domain_name: lan
  dhcpv4:
    gateway_ip: ""
    subnet_mask: ""
    range_start: ""
    range_end: ""
    lease_duration: 86400
    icmp_timeout_msec: 1000
  dhcpv6:
    range_start: ""
    lease_duration: 86400
    ra_slaac_only: false
    ra_allow_slaac: false
clients: []
log_file: ""
log_max_backups: 0
log_max_size: 100
log_max_age: 3
log_compress: false
log_localtime: false
log_verbose: false
os:
  group: ""
  user: ""
  rlimit_nofile: 0
schema_version: 28
